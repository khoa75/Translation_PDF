version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./benchmark:/app/benchmark
      - ./services:/app/services
    environment:
      - PYTHONPATH=/app

  frontend:
    image: node:14
    command: bash -c "cd /app/frontend && npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend