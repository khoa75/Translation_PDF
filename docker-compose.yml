version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app/src

  frontend:
    image: python:3.13-slim
    command: bash -c "pip install streamlit && streamlit run app.py"
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    working_dir: /app/frontend
    depends_on:
      - backend